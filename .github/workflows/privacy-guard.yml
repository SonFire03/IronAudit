name: Privacy Guard

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  privacy-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run privacy guard
        run: python scripts/privacy_guard.py
